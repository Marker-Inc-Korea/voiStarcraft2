name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-contracts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install package
        run: uv sync --python ${{ matrix.python-version }} --extra dev --extra llm
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest -q
      - name: Check soak scripts
        run: |
          bash -n integrations/micromachine/scripts/smoke_macos_local.sh
          bash -n integrations/micromachine/scripts/soak_macos_local.sh
          bash -n integrations/micromachine/scripts/soak_matrix_macos_local.sh
